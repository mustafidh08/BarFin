<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — KeuanganSyariah.id</title>
  <meta name="description" content="Dashboard keuangan personal syariah. Pantau saldo, pemasukan, pengeluaran, dan estimasi zakat.">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#059669">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:'class',theme:{extend:{fontFamily:{sans:['Plus Jakarta Sans','sans-serif'],amiri:['Amiri','serif']}}}}</script>
  <link rel="stylesheet" href="css/custom.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
  <!-- Sidebar -->
  <aside id="sidebar" class="fixed left-0 top-0 bottom-0 w-64 bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 flex flex-col z-40 overflow-y-auto"></aside>

  <!-- Main Content -->
  <main class="main-content md:ml-64 p-4 md:p-8 pb-24">
    <!-- Header -->
    <div class="flex items-center justify-between mb-8">
      <div>
        <h1 class="text-2xl md:text-3xl font-bold">Dashboard</h1>
        <p class="text-sm text-gray-500 dark:text-gray-400 mt-1" id="greeting-text"></p>
      </div>
      <button data-toggle-dark class="md:hidden p-2 rounded-lg bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700">
        <span data-dark-icon>🌙</span>
      </button>
    </div>

    <!-- Risk Profile Banner (jika belum quiz) -->
    <div id="risk-banner" class="hidden mb-6"></div>

    <!-- Stats Cards -->
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8 stagger-children" id="stats-cards"></div>

    <!-- Charts Row -->
    <div class="grid lg:grid-cols-5 gap-6 mb-8">
      <div class="lg:col-span-3 bg-white dark:bg-gray-800 rounded-2xl p-5 shadow-sm border border-gray-100 dark:border-gray-700">
        <h3 class="font-bold mb-4">Pemasukan vs Pengeluaran</h3>
        <div class="h-72"><canvas id="chart-pp"></canvas></div>
      </div>
      <div class="lg:col-span-2 bg-white dark:bg-gray-800 rounded-2xl p-5 shadow-sm border border-gray-100 dark:border-gray-700">
        <h3 class="font-bold mb-4">Pengeluaran per Kategori</h3>
        <div class="h-72"><canvas id="chart-kategori"></canvas></div>
      </div>
    </div>

    <!-- Recent Transactions -->
    <div class="bg-white dark:bg-gray-800 rounded-2xl p-5 shadow-sm border border-gray-100 dark:border-gray-700 mb-8">
      <div class="flex items-center justify-between mb-4">
        <h3 class="font-bold">Transaksi Terbaru</h3>
        <a href="transaksi.html" class="text-sm text-emerald-600 dark:text-emerald-400 hover:underline font-medium">Lihat Semua →</a>
      </div>
      <div id="recent-transactions"></div>
    </div>

    <!-- Daily Quote -->
    <div class="bg-emerald-50 dark:bg-emerald-900/20 rounded-2xl p-6 border border-emerald-100 dark:border-emerald-800/30" id="daily-quote"></div>
  </main>

  <!-- Bottom Nav (Mobile) -->
  <nav id="bottom-nav" class="fixed bottom-0 left-0 right-0 bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 flex justify-around items-center h-16 z-40 md:hidden"></nav>

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/storage.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/app.js"></script>
  <script src="js/charts.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      let data = getData();

      // Coba ambil nama dari Google jika belum ada nama
      if (!data.user.nama && typeof getSupabaseUser === 'function') {
        const user = await getSupabaseUser();
        if (user && user.user_metadata && user.user_metadata.full_name) {
          data.user.nama = sanitizeInput(user.user_metadata.full_name);
          saveData(data);
        }
      }

      // Onboarding modal (jika belum onboarded)
      if (!data.user.onboarded) {
        if (data.user.nama) {
          showOnboardingStep(2); // Skip Step 1 (Nama) karena sudah dapat dari Google
        } else {
          showOnboardingStep(1);
        }
      }

      renderDashboard();
    });

    function renderDashboard() {
      const data = getData();

      // Greeting
      const hour = new Date().getHours();
      const greeting = hour < 12 ? 'Selamat Pagi' : hour < 15 ? 'Selamat Siang' : hour < 18 ? 'Selamat Sore' : 'Selamat Malam';
      const greetEl = document.getElementById('greeting-text');
      greetEl.textContent = `${greeting}, ${data.user.nama || 'Pengguna'}! ☀️`;

      // Risk profile banner
      const banner = document.getElementById('risk-banner');
      if (!data.risk_profile.sudah_isi_quiz) {
        banner.classList.remove('hidden');
        banner.innerHTML = `
          <div class="bg-amber-50 dark:bg-amber-900/20 border border-amber-200 dark:border-amber-800/40 rounded-2xl p-5 flex flex-col sm:flex-row items-start sm:items-center gap-4">
            <div class="flex-1">
              <h3 class="font-bold text-amber-800 dark:text-amber-300 mb-1">📋 Belum tahu profil risikomu?</h3>
              <p class="text-sm text-amber-700 dark:text-amber-400">Isi quiz 5 menit untuk mendapat rekomendasi investasi syariah yang sesuai kemampuanmu.</p>
            </div>
            <a href="investasi.html#quiz" class="px-5 py-2.5 bg-amber-500 text-white text-sm font-semibold rounded-xl hover:bg-amber-600 transition whitespace-nowrap">Isi Quiz Sekarang</a>
          </div>`;
      } else {
        banner.classList.add('hidden');
      }

      // Stats Cards
      const transBulanIni = getTransaksiBulanIni(data);
      const pemasukan = getTotalPemasukan(transBulanIni);
      const pengeluaran = getTotalPengeluaran(transBulanIni);
      const saldo = getTotalSaldo(data);
      const estimasiZakat = pemasukan * 0.025;

      const deltaPemasukan = getDeltaBulanLalu(data, 'pemasukan');
      const deltaPengeluaran = getDeltaBulanLalu(data, 'pengeluaran');

      const statsEl = document.getElementById('stats-cards');
      statsEl.innerHTML = `
        ${statCard('Total Saldo', saldo, '💰', null, saldo >= 0 ? 'emerald' : 'red')}
        ${statCard('Pemasukan Bulan Ini', pemasukan, '📈', deltaPemasukan, 'emerald')}
        ${statCard('Pengeluaran Bulan Ini', pengeluaran, '📉', deltaPengeluaran, 'red')}
        ${statCard('Estimasi Zakat', estimasiZakat, '🕌', null, 'amber')}
      `;

      // Charts
      renderChartPemasukanPengeluaran('chart-pp', data);
      renderChartKategoriPengeluaran('chart-kategori', data);

      // Recent Transactions
      const recentEl = document.getElementById('recent-transactions');
      const recent = [...data.transaksi].sort((a, b) => new Date(b.tanggal) - new Date(a.tanggal)).slice(0, 5);

      if (recent.length === 0) {
        recentEl.innerHTML = `
          <div class="text-center py-10 text-gray-400 dark:text-gray-500">
            <svg class="w-16 h-16 mx-auto mb-3 opacity-40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M9 12h6M12 9v6"/></svg>
            <p class="text-sm mb-3">Belum ada transaksi</p>
            <a href="transaksi.html" class="text-sm text-emerald-600 dark:text-emerald-400 font-semibold hover:underline">+ Tambah Transaksi Pertama</a>
          </div>`;
      } else {
        recentEl.innerHTML = recent.map(t => {
          const isIncome = t.tipe === 'pemasukan';
          const labelClass = t.label_syariah === 'halal' ? 'label-halal' : t.label_syariah === 'syubhat' ? 'label-syubhat' : 'label-haram';
          return `
            <div class="flex items-center gap-3 py-3 border-b border-gray-100 dark:border-gray-700 last:border-b-0">
              <div class="w-10 h-10 rounded-xl flex items-center justify-center text-lg ${isIncome ? 'bg-emerald-100 dark:bg-emerald-900/30' : 'bg-red-100 dark:bg-red-900/30'}">${isIncome ? '📈' : '📉'}</div>
              <div class="flex-1 min-w-0">
                <p class="text-sm font-medium truncate">${sanitizeInput(t.kategori)}</p>
                <p class="text-xs text-gray-500 dark:text-gray-400">${formatTanggal(t.tanggal)}${t.catatan ? ' · ' + sanitizeInput(t.catatan).substring(0, 30) : ''}</p>
              </div>
              <div class="text-right">
                <p class="text-sm font-bold ${isIncome ? 'text-emerald-600 dark:text-emerald-400' : 'text-red-500'}">${isIncome ? '+' : '-'}${formatRupiah(t.jumlah)}</p>
                <span class="text-[10px] px-2 py-0.5 rounded-full font-medium ${labelClass}">${t.label_syariah}</span>
              </div>
            </div>`;
        }).join('');
      }

      // Daily Quote
      const quote = getQuoteHariIni();
      document.getElementById('daily-quote').innerHTML = `
        <p class="text-emerald-800 dark:text-emerald-200 text-sm md:text-base italic mb-2">"${sanitizeInput(quote.text)}"</p>
        <p class="text-emerald-600 dark:text-emerald-400 text-xs font-semibold">— ${sanitizeInput(quote.source)}</p>`;
    }

    function statCard(label, amount, icon, delta, color) {
      const deltaHTML = delta !== null && delta !== undefined
        ? `<span class="text-xs ${parseFloat(delta) >= 0 ? 'text-emerald-500' : 'text-red-500'}">${parseFloat(delta) >= 0 ? '▲' : '▼'} ${Math.abs(delta)}% vs bulan lalu</span>`
        : '';
      return `
        <div class="bg-white dark:bg-gray-800 rounded-2xl p-5 shadow-sm border border-gray-100 dark:border-gray-700">
          <div class="flex items-center justify-between mb-3">
            <span class="text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wide">${label}</span>
            <span class="text-lg">${icon}</span>
          </div>
          <p class="text-xl md:text-2xl font-bold text-${color}-600 dark:text-${color}-400">${formatRupiah(amount)}</p>
          ${deltaHTML}
        </div>`;
    }

    // ── Onboarding Modal ───────────────────────────────────
    function showOnboarding() {
      const data = getData();
      if (data.user.nama) {
        showOnboardingStep(2);
      } else {
        showOnboardingStep(1);
      }
    }

    function showOnboardingStep(step) {
      if (step === 1) {
        openModal(`
          <div class="p-6 md:p-8">
            <div class="text-center mb-6">
              <div class="w-16 h-16 bg-emerald-100 dark:bg-emerald-900/40 rounded-2xl flex items-center justify-center text-3xl mx-auto mb-4">👋</div>
              <h2 class="text-xl font-bold">Halo! Siapa nama kamu?</h2>
              <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">Kami ingin memanggilmu dengan nama yang tepat</p>
            </div>
            <input id="onboard-nama" type="text" placeholder="Ketik namamu di sini..." class="w-full px-4 py-3 rounded-xl border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition" autofocus>
            <p id="onboard-nama-error" class="text-xs text-red-500 mt-1 hidden">Nama tidak boleh kosong</p>
            <button id="onboard-next-1" class="w-full mt-4 py-3 bg-emerald-600 text-white font-semibold rounded-xl hover:bg-emerald-700 transition disabled:opacity-50 disabled:cursor-not-allowed" disabled>Lanjut →</button>
          </div>`, { persistent: true });

        setTimeout(() => {
          const input = document.getElementById('onboard-nama');
          const btn = document.getElementById('onboard-next-1');
          const err = document.getElementById('onboard-nama-error');
          if (input) {
            input.addEventListener('input', () => {
              const valid = input.value.trim().length > 0;
              btn.disabled = !valid;
              err.classList.toggle('hidden', valid);
            });
          }
          if (btn) {
            btn.addEventListener('click', () => {
              const nama = document.getElementById('onboard-nama').value.trim();
              if (!nama) return;
              const data = getData();
              data.user.nama = sanitizeInput(nama);
              saveData(data);
              closeModal();
              setTimeout(() => showOnboardingStep(2), 200);
            });
          }
        }, 200);

      } else if (step === 2) {
        openModal(`
          <div class="p-6 md:p-8">
            <div class="text-center mb-6">
              <div class="w-16 h-16 bg-amber-100 dark:bg-amber-900/40 rounded-2xl flex items-center justify-center text-3xl mx-auto mb-4">🪙</div>
              <h2 class="text-xl font-bold">Berapa harga emas hari ini?</h2>
              <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">Untuk menghitung nishab zakat. Bisa diperbarui nanti.</p>
            </div>
            <div class="relative">
              <span class="absolute left-4 top-1/2 -translate-y-1/2 text-sm text-gray-400">Rp</span>
              <input id="onboard-emas" type="text" value="1.500.000" class="w-full px-4 py-3 pl-10 rounded-xl border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition text-right font-mono">
            </div>
            <p class="text-xs text-gray-500 dark:text-gray-400 mt-2">Cek harga terkini: <a href="https://www.pegadaian.co.id/harga-emas" target="_blank" class="text-emerald-600 underline">Pegadaian</a> | <a href="https://www.logammulia.com" target="_blank" class="text-emerald-600 underline">Antam Logam Mulia</a></p>
            <button id="onboard-next-2" class="w-full mt-4 py-3 bg-emerald-600 text-white font-semibold rounded-xl hover:bg-emerald-700 transition">Lanjut →</button>
          </div>`, { persistent: true });

        setTimeout(() => {
          const input = document.getElementById('onboard-emas');
          if (input) {
            input.addEventListener('input', () => {
              let raw = input.value.replace(/\D/g, '');
              if (raw) input.value = new Intl.NumberFormat('id-ID').format(parseInt(raw));
            });
          }
          const btn = document.getElementById('onboard-next-2');
          if (btn) {
            btn.addEventListener('click', () => {
              const raw = document.getElementById('onboard-emas').value.replace(/\D/g, '');
              const harga = parseInt(raw) || 1500000;
              const data = getData();
              data.user.nisab_harga_emas_per_gram = harga;
              data.user.onboarded = true;
              saveData(data);
              closeModal();
              setTimeout(() => showOnboardingStep(3), 200);
            });
          }
        }, 200);

      } else if (step === 3) {
        openModal(`
          <div class="p-6 md:p-8 text-center">
            <div class="w-16 h-16 bg-emerald-100 dark:bg-emerald-900/40 rounded-2xl flex items-center justify-center text-3xl mx-auto mb-4">🎉</div>
            <h2 class="text-xl font-bold mb-2">Setup Selesai!</h2>
            <p class="text-sm text-gray-500 dark:text-gray-400 mb-6">Yuk isi quiz profil risiko investasimu untuk mendapat rekomendasi yang tepat.</p>
            <a href="investasi.html#quiz" class="block w-full py-3 bg-emerald-600 text-white font-semibold rounded-xl hover:bg-emerald-700 transition mb-3 text-center">Isi Quiz Sekarang</a>
            <button onclick="closeModal(); renderDashboard(); renderSidebar();" class="w-full py-3 text-gray-600 dark:text-gray-400 font-medium rounded-xl hover:bg-gray-100 dark:hover:bg-gray-700 transition">Lewati dulu</button>
          </div>`);
      }
    }
  </script>
</body>
</html>
