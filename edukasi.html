<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edukasi Ekonomi Syariah — KeuanganSyariah.id</title>
  <meta name="description" content="Pelajari dasar-dasar ekonomi syariah: riba, gharar, zakat, investasi halal, dan lainnya. Dilengkapi dalil.">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#059669">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:'class',theme:{extend:{fontFamily:{sans:['Plus Jakarta Sans','sans-serif'],amiri:['Amiri','serif']}}}}</script>
  <link rel="stylesheet" href="css/custom.css">
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
  <aside id="sidebar" class="fixed left-0 top-0 bottom-0 w-64 bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 flex flex-col z-40 overflow-y-auto"></aside>

  <main class="main-content md:ml-64 p-4 md:p-8 pb-24">
    <h1 class="text-2xl md:text-3xl font-bold mb-2">Edukasi Ekonomi Syariah</h1>
    <p class="text-sm text-gray-500 dark:text-gray-400 mb-6">Pelajari prinsip keuangan Islam dengan dalil yang jelas</p>

    <!-- Search & Filter -->
    <div class="flex flex-wrap gap-3 mb-6">
      <input type="text" placeholder="🔍 Cari artikel..." class="flex-1 min-w-[200px] px-4 py-2.5 rounded-xl border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-800 text-sm outline-none focus:ring-2 focus:ring-emerald-500 transition" oninput="debouncedSearchArticle(this.value)">
      <div class="flex flex-wrap gap-2" id="filter-pills"></div>
    </div>

    <!-- Article Grid -->
    <div id="articles-grid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-4"></div>

    <!-- Article Detail (hidden by default) -->
    <div id="article-detail" class="hidden"></div>
  </main>

  <nav id="bottom-nav" class="fixed bottom-0 left-0 right-0 bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 flex justify-around items-center h-16 z-40 md:hidden"></nav>

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/storage.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/app.js"></script>
  <script>
    const ARTICLES = [
      { id:'riba', judul:'Apa Itu Riba dan Mengapa Harus Dihindari?', kategori:'Dasar Syariah', dalil:'QS. Al-Baqarah: 275-276', durasi:'8 menit', gradien:'from-red-500 to-rose-600',
        arab:'ٱلَّذِينَ يَأۡكُلُونَ ٱلرِّبَوٰاْ لَا يَقُومُونَ إِلَّا كَمَا يَقُومُ ٱلَّذِي يَتَخَبَّطُهُ ٱلشَّيۡطَٰنُ مِنَ ٱلۡمَسِّ',
        isi:`<p>Riba secara bahasa berarti tambahan atau kelebihan. Dalam istilah syariah, riba adalah tambahan yang disyaratkan dalam transaksi pinjam-meminjam atau jual beli yang tidak memiliki padanan kompensasi (iwadh) yang dibenarkan syariah.</p>
        <h4>Jenis-Jenis Riba</h4>
        <p><strong>1. Riba Fadhl:</strong> Kelebihan dalam pertukaran barang sejenis (emas dengan emas, gandum dengan gandum) yang tidak sama timbangannya.</p>
        <p><strong>2. Riba Nasi'ah:</strong> Tambahan yang disyaratkan sebagai kompensasi penangguhan waktu pembayaran. Ini yang paling umum ditemui dalam sistem bunga bank konvensional.</p>
        <h4>Mengapa Riba Diharamkan?</h4>
        <p>Islam melarang riba karena beberapa alasan fundamental:</p>
        <ul><li>Menciptakan ketidakadilan — pemberi pinjaman mendapat keuntungan pasti tanpa menanggung risiko</li><li>Mengeksploitasi orang yang membutuhkan</li><li>Menciptakan gap kekayaan yang semakin lebar</li><li>Menghambat produktivitas ekonomi riil</li></ul>
        <h4>Alternatif Syariah</h4>
        <p>Islam menawarkan sistem bagi hasil (mudharabah/musyarakah) di mana risiko dan keuntungan dibagi secara adil antara pemilik modal dan pengelola.</p>`
      },
      { id:'zakat-panduan', judul:'Panduan Lengkap Zakat: Hukum, Jenis, dan Cara Hitung', kategori:'Zakat', dalil:'QS. At-Taubah: 103', durasi:'10 menit', gradien:'from-emerald-500 to-teal-600',
        arab:'خُذۡ مِنۡ أَمۡوَٰلِهِمۡ صَدَقَةٗ تُطَهِّرُهُمۡ وَتُزَكِّيهِم بِهَا',
        isi:`<p>Zakat adalah rukun Islam ketiga yang wajib ditunaikan oleh setiap Muslim yang memenuhi syarat. Secara bahasa, zakat berarti "penyucian" dan "pertumbuhan".</p>
        <h4>Syarat Wajib Zakat Maal</h4>
        <ul><li>Muslim</li><li>Merdeka</li><li>Harta mencapai nishab (setara 85 gram emas)</li><li>Harta sudah dimiliki selama 1 tahun hijriyah (haul)</li><li>Harta berkembang atau berpotensi berkembang</li></ul>
        <h4>Cara Menghitung</h4>
        <p>Zakat maal = 2.5% × (total harta - hutang), jika total harta bersih ≥ nishab.</p>
        <p>Zakat penghasilan = 2.5% × penghasilan bruto, jika penghasilan ≥ nishab bulanan.</p>
        <h4>8 Golongan Penerima Zakat (Asnaf)</h4>
        <p>Fakir, miskin, amil (pengelola zakat), mualaf, riqab (memerdekakan budak), gharim (orang berhutang), fi sabilillah (pejuang di jalan Allah), dan ibnu sabil (musafir).</p>`
      },
      { id:'investasi-halal', judul:'Investasi Halal: Prinsip dan Instrumen yang Dibolehkan', kategori:'Investasi', dalil:'QS. Al-Baqarah: 275', durasi:'12 menit', gradien:'from-blue-500 to-indigo-600',
        arab:'وَأَحَلَّ ٱللَّهُ ٱلۡبَيۡعَ وَحَرَّمَ ٱلرِّبَوٰاْ',
        isi:`<p>Investasi dalam Islam tidak hanya dibolehkan, tapi dianjurkan selama memenuhi prinsip syariah. Kunci utamanya adalah menghindari riba, gharar (ketidakpastian berlebihan), dan maysir (spekulasi/judi).</p>
        <h4>Prinsip Investasi Syariah</h4>
        <ul><li><strong>Bebas Riba:</strong> Tidak boleh ada unsur bunga tetap</li><li><strong>Bebas Gharar:</strong> Kontrak harus jelas dan transparan</li><li><strong>Bebas Maysir:</strong> Bukan spekulasi murni atau perjudian</li><li><strong>Sektor Halal:</strong> Perusahaan tidak boleh bergerak di bidang alkohol, babi, perjudian, pornografi, atau senjata</li></ul>
        <h4>Instrumen Investasi Halal</h4>
        <p>Saham syariah (DES OJK), sukuk, reksa dana syariah, deposito syariah, emas, dan properti.</p>`
      },
      { id:'gharar', judul:'Memahami Gharar: Ketidakpastian yang Dilarang Islam', kategori:'Dasar Syariah', dalil:'HR. Muslim No. 1513', durasi:'7 menit', gradien:'from-amber-500 to-orange-600',
        arab:'',
        isi:`<p>Gharar secara bahasa berarti bahaya atau ketidakpastian. Dalam fikih muamalah, gharar merujuk pada transaksi yang mengandung ketidakjelasan signifikan yang bisa merugikan salah satu pihak.</p>
        <h4>Contoh Gharar dalam Keuangan Modern</h4>
        <ul><li>Menjual barang yang belum dimiliki</li><li>Kontrak derivatif yang sangat spekulatif</li><li>Asuransi konvensional (diganti dengan takaful syariah)</li><li>Trading forex dengan leverage sangat tinggi</li></ul>
        <h4>Gharar vs Risiko yang Wajar</h4>
        <p>Islam tidak melarang semua bentuk risiko. Risiko bisnis yang wajar (mukhatara) dibolehkan karena ada usaha riil di baliknya. Yang dilarang adalah gharar fahisy — ketidakpastian yang berlebihan dan tidak perlu.</p>`
      },
      { id:'israf', judul:'Menghindari Israf: Hidup Cukup dan Bersyukur', kategori:'Gaya Hidup', dalil:'QS. Al-Isra: 26-27', durasi:'6 menit', gradien:'from-purple-500 to-violet-600',
        arab:'وَلَا تُبَذِّرۡ تَبۡذِيرًا إِنَّ ٱلۡمُبَذِّرِينَ كَانُوٓاْ إِخۡوَٰنَ ٱلشَّيَٰطِينِ',
        isi:`<p>Israf berarti berlebih-lebihan dalam menggunakan harta. Islam mengajarkan keseimbangan — tidak boros (israf) dan tidak juga kikir (bukhl).</p>
        <h4>Prinsip Pengeluaran dalam Islam</h4>
        <ul><li>Dahulukan kebutuhan pokok (dharuriyat)</li><li>Kemudian kebutuhan sekunder (hajiyat)</li><li>Terakhir kebutuhan tersier (tahsiniyat)</li><li>Sisihkan untuk zakat, sedekah, dan tabungan</li></ul>
        <p>Nabi Muhammad SAW bersabda: "Makan, minum, berpakaianlah dan bersedekahlah tanpa berlebih-lebihan dan tanpa kesombongan." (HR. Ahmad & Nasa'i)</p>`
      },
      { id:'sedekah', judul:'Sedekah: Bukan Mengurangi Tapi Melipatgandakan', kategori:'Sedekah', dalil:'QS. Al-Baqarah: 261', durasi:'7 menit', gradien:'from-emerald-500 to-green-600',
        arab:'مَّثَلُ ٱلَّذِينَ يُنفِقُونَ أَمۡوَٰلَهُمۡ فِي سَبِيلِ ٱللَّهِ كَمَثَلِ حَبَّةٍ أَنۢبَتَتۡ سَبۡعَ سَنَابِلَ',
        isi:`<p>Sedekah dalam Islam memiliki dimensi spiritual dan ekonomi. Allah menjanjikan bahwa harta yang disedekahkan tidak akan berkurang, justru akan dilipatgandakan pahalanya.</p>
        <h4>Jenis-Jenis Sedekah</h4>
        <ul><li><strong>Sedekah wajib:</strong> Zakat fitrah dan zakat maal</li><li><strong>Sedekah sunnah:</strong> Infak, wakaf, hadiah</li><li><strong>Sedekah jariyah:</strong> Sedekah yang pahalanya terus mengalir (membangun masjid, sumur, sekolah)</li></ul>
        <p>Rasulullah SAW bersabda: "Harta tidak akan berkurang karena sedekah." (HR. Muslim)</p>`
      },
      { id:'bank-syariah', judul:'Bank Syariah vs Bank Konvensional: Apa Bedanya?', kategori:'Perbankan', dalil:'', durasi:'9 menit', gradien:'from-teal-500 to-cyan-600',
        arab:'',
        isi:`<p>Perbedaan fundamental antara bank syariah dan konvensional terletak pada prinsip operasionalnya.</p>
        <h4>Bank Konvensional</h4>
        <p>Menggunakan sistem bunga (interest) — peminjam wajib membayar bunga tetap terlepas dari untung atau rugi usahanya.</p>
        <h4>Bank Syariah</h4>
        <p>Menggunakan akad-akad syariah:</p>
        <ul><li><strong>Mudharabah:</strong> Bank sebagai pemilik modal, nasabah sebagai pengelola. Keuntungan dibagi sesuai nisbah.</li><li><strong>Musyarakah:</strong> Kerja sama modal antara bank dan nasabah. Untung-rugi dibagi bersama.</li><li><strong>Murabahah:</strong> Bank membeli barang, lalu menjual ke nasabah dengan margin yang disepakati.</li><li><strong>Ijarah:</strong> Sewa-menyewa aset dengan ketentuan syariah.</li></ul>
        <h4>Dewan Pengawas Syariah (DPS)</h4>
        <p>Setiap bank syariah wajib memiliki DPS yang bertugas memastikan semua produk dan operasional sesuai prinsip syariah.</p>`
      },
      { id:'profil-risiko', judul:'Profil Risiko dan Kehati-hatian dalam Investasi Islami', kategori:'Investasi', dalil:'QS. Al-Hasyr: 18', durasi:'8 menit', gradien:'from-indigo-500 to-blue-600',
        arab:'يَٰٓأَيُّهَا ٱلَّذِينَ ءَامَنُواْ ٱتَّقُواْ ٱللَّهَ وَلۡتَنظُرۡ نَفۡسٞ مَّا قَدَّمَتۡ لِغَدٖ',
        isi:`<p>Konsep ihtiyath (kehati-hatian) adalah prinsip penting dalam fikih muamalah Islam. Dalam konteks investasi, ini berarti setiap Muslim wajib mengenali kemampuan dan batas toleransi risikonya sebelum berinvestasi.</p>
        <h4>Mengapa Profil Risiko Penting?</h4>
        <ul><li>Mencegah keputusan emosional saat pasar bergejolak</li><li>Memastikan investasi sesuai dengan tujuan dan kemampuan finansial</li><li>Menghindari gharar (ketidakpastian berlebihan) yang dilarang Islam</li></ul>
        <h4>Hubungan Gharar dengan Risiko</h4>
        <p>Risiko bisnis yang terukur (mukhatara) berbeda dengan gharar. Investasi saham syariah mengandung risiko wajar karena ada aset riil di baliknya. Yang dilarang adalah spekulasi murni tanpa landasan analisis.</p>`
      }
    ];

    const CATEGORIES = [...new Set(ARTICLES.map(a => a.kategori))];
    let currentCategory = 'semua';
    let searchQuery = '';

    function renderFilterPills() {
      const el = document.getElementById('filter-pills');
      el.innerHTML = `
        <button onclick="filterCategory('semua')" class="px-3 py-1.5 rounded-full text-xs font-medium transition ${currentCategory === 'semua' ? 'bg-emerald-600 text-white' : 'bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-gray-600'}">Semua</button>
        ${CATEGORIES.map(c => `<button onclick="filterCategory('${c}')" class="px-3 py-1.5 rounded-full text-xs font-medium transition ${currentCategory === c ? 'bg-emerald-600 text-white' : 'bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-gray-600'}">${c}</button>`).join('')}`;
    }

    function filterCategory(cat) { currentCategory = cat; renderFilterPills(); renderArticleGrid(); }
    const debouncedSearchArticle = debounce((val) => { searchQuery = val.toLowerCase(); renderArticleGrid(); }, 300);

    function getReadArticles() {
      const data = getData();
      return data.read_articles || [];
    }
    function markAsRead(id) {
      const data = getData();
      if (!data.read_articles) data.read_articles = [];
      if (!data.read_articles.includes(id)) data.read_articles.push(id);
      saveData(data);
    }

    function renderArticleGrid() {
      const grid = document.getElementById('articles-grid');
      const detail = document.getElementById('article-detail');
      grid.classList.remove('hidden'); detail.classList.add('hidden');

      let filtered = ARTICLES;
      if (currentCategory !== 'semua') filtered = filtered.filter(a => a.kategori === currentCategory);
      if (searchQuery) filtered = filtered.filter(a => a.judul.toLowerCase().includes(searchQuery));

      const readList = getReadArticles();

      if (filtered.length === 0) {
        grid.innerHTML = '<div class="col-span-full text-center py-16 text-gray-400"><p>Tidak ada artikel yang cocok</p></div>';
        return;
      }

      grid.innerHTML = filtered.map(a => {
        const isRead = readList.includes(a.id);
        return `
          <div onclick="showArticle('${a.id}')" class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 overflow-hidden cursor-pointer card-hover group">
            <div class="h-28 bg-gradient-to-br ${a.gradien} flex items-center justify-center relative">
              <span class="text-4xl opacity-80">📖</span>
              ${isRead ? '<span class="absolute top-2 right-2 text-[10px] px-2 py-0.5 bg-white/90 dark:bg-gray-800/90 rounded-full font-medium text-emerald-600">✅ Dibaca</span>' : ''}
            </div>
            <div class="p-4">
              <span class="text-[10px] px-2 py-0.5 rounded-full bg-gray-100 dark:bg-gray-700 text-gray-500 dark:text-gray-400 font-medium">${a.kategori}</span>
              <h3 class="font-bold text-sm mt-2 mb-1 group-hover:text-emerald-600 transition line-clamp-2">${a.judul}</h3>
              <p class="text-xs text-gray-500 dark:text-gray-400">⏱ ${a.durasi}${a.dalil ? ' · ' + a.dalil : ''}</p>
            </div>
          </div>`;
      }).join('');
    }

    function showArticle(id) {
      const a = ARTICLES.find(x => x.id === id);
      if (!a) return;
      markAsRead(id);

      const grid = document.getElementById('articles-grid');
      const detail = document.getElementById('article-detail');
      grid.classList.add('hidden');
      detail.classList.remove('hidden');

      detail.innerHTML = `
        <div class="max-w-3xl mx-auto fade-in">
          <button onclick="renderArticleGrid()" class="text-sm text-gray-500 hover:text-emerald-600 mb-4 inline-flex items-center gap-1">← Kembali ke daftar</button>
          <div class="h-40 bg-gradient-to-br ${a.gradien} rounded-2xl flex items-center justify-center mb-6">
            <span class="text-5xl">📖</span>
          </div>
          <span class="text-xs px-2 py-0.5 rounded-full bg-gray-100 dark:bg-gray-700 text-gray-500 font-medium">${a.kategori}</span>
          <h1 class="text-2xl md:text-3xl font-bold mt-3 mb-4">${a.judul}</h1>
          <p class="text-sm text-gray-500 dark:text-gray-400 mb-6">⏱ ${a.durasi}${a.dalil ? ' · Dalil: ' + a.dalil : ''}</p>
          ${a.arab ? `
            <div class="bg-emerald-50 dark:bg-emerald-900/20 rounded-xl p-5 border border-emerald-100 dark:border-emerald-800/30 mb-6">
              <p class="font-amiri text-xl text-emerald-800 dark:text-emerald-200 text-right leading-relaxed mb-3" dir="rtl">${a.arab}</p>
              <p class="text-xs text-emerald-600 dark:text-emerald-400 font-semibold">${a.dalil}</p>
            </div>` : ''}
          <div class="prose prose-sm dark:prose-invert max-w-none space-y-4 text-gray-700 dark:text-gray-300 leading-relaxed [&_h4]:font-bold [&_h4]:text-gray-900 [&_h4]:dark:text-white [&_h4]:mt-6 [&_h4]:mb-2 [&_ul]:list-disc [&_ul]:pl-5 [&_ul]:space-y-1 [&_li]:text-sm">
            ${a.isi}
          </div>
        </div>`;
      window.scrollTo(0, 0);
    }

    document.addEventListener('DOMContentLoaded', () => {
      renderFilterPills();
      renderArticleGrid();
    });
  </script>
</body>
</html>
