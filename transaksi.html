<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transaksi — KeuanganSyariah.id</title>
  <meta name="description" content="Catat dan kelola transaksi keuangan dengan label syariah: halal, syubhat, atau haram.">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#059669">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:'class',theme:{extend:{fontFamily:{sans:['Plus Jakarta Sans','sans-serif']}}}}</script>
  <link rel="stylesheet" href="css/custom.css">
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
  <aside id="sidebar" class="fixed left-0 top-0 bottom-0 w-64 bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 flex flex-col z-40 overflow-y-auto"></aside>

  <main class="main-content md:ml-64 p-4 md:p-8 pb-24">
    <div class="flex items-center justify-between mb-6">
      <h1 class="text-2xl md:text-3xl font-bold">Transaksi</h1>
      <div class="flex gap-2">
        <button onclick="openAddTransaksiModal('pemasukan')" class="px-4 py-2.5 bg-emerald-600 text-white text-sm font-semibold rounded-xl hover:bg-emerald-700 transition">+ Pemasukan</button>
        <button onclick="openAddTransaksiModal('pengeluaran')" class="px-4 py-2.5 bg-red-600 text-white text-sm font-semibold rounded-xl hover:bg-red-700 transition">+ Pengeluaran</button>
      </div>
    </div>

    <!-- Summary -->
    <div id="transaksi-summary" class="mb-6"></div>

    <!-- Filters -->
    <div class="bg-white dark:bg-gray-800 rounded-2xl p-4 shadow-sm border border-gray-100 dark:border-gray-700 mb-4">
      <div class="flex flex-wrap gap-3 items-center">
        <!-- Tipe Filter -->
        <div class="flex bg-gray-100 dark:bg-gray-700 rounded-lg p-0.5 text-xs font-medium">
          <button onclick="setFilter('tipe','semua')" id="f-semua" class="px-3 py-1.5 rounded-md transition bg-white dark:bg-gray-600 shadow-sm text-gray-900 dark:text-white">Semua</button>
          <button onclick="setFilter('tipe','pemasukan')" id="f-pemasukan" class="px-3 py-1.5 rounded-md transition text-gray-500">Pemasukan</button>
          <button onclick="setFilter('tipe','pengeluaran')" id="f-pengeluaran" class="px-3 py-1.5 rounded-md transition text-gray-500">Pengeluaran</button>
          <button onclick="setFilter('tipe','bulan_ini')" id="f-bulan_ini" class="px-3 py-1.5 rounded-md transition text-gray-500">Bulan Ini</button>
        </div>
        <!-- Label Filter -->
        <select onchange="setFilter('label', this.value)" class="px-3 py-2 rounded-lg border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-700 text-xs">
          <option value="semua">Semua Label</option>
          <option value="halal">✅ Halal</option>
          <option value="syubhat">⚠️ Syubhat</option>
          <option value="haram">❌ Haram</option>
        </select>
        <!-- Sort -->
        <select onchange="setFilter('sort', this.value)" class="px-3 py-2 rounded-lg border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-700 text-xs">
          <option value="terbaru">Terbaru</option>
          <option value="terlama">Terlama</option>
          <option value="terbesar">Terbesar</option>
          <option value="terkecil">Terkecil</option>
        </select>
        <!-- Search -->
        <input type="text" placeholder="🔍 Cari catatan atau kategori..." class="flex-1 min-w-[200px] px-3 py-2 rounded-lg border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-700 text-xs outline-none focus:ring-2 focus:ring-emerald-500 transition" oninput="debouncedSearch(this.value)">
      </div>
    </div>

    <!-- Transaction List -->
    <div id="transaksi-list"></div>
    <div id="pagination"></div>
  </main>

  <nav id="bottom-nav" class="fixed bottom-0 left-0 right-0 bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 flex justify-around items-center h-16 z-40 md:hidden"></nav>

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/storage.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/app.js"></script>
  <script src="js/transaksi.js"></script>
  <script>
    const debouncedSearch = debounce((val) => { setFilter('search', val); }, 300);
    // Highlight active filter button
    const origSetFilter = setFilter;
    setFilter = function(key, value) {
      origSetFilter(key, value);
      if (key === 'tipe') {
        ['semua','pemasukan','pengeluaran','bulan_ini'].forEach(v => {
          const btn = document.getElementById('f-' + v);
          if (btn) {
            if (v === value) btn.className = 'px-3 py-1.5 rounded-md transition bg-white dark:bg-gray-600 shadow-sm text-gray-900 dark:text-white';
            else btn.className = 'px-3 py-1.5 rounded-md transition text-gray-500';
          }
        });
      }
    };
    document.addEventListener('DOMContentLoaded', () => {
      renderTransaksiList();
      renderTransaksiSummary();
    });
  </script>
</body>
</html>
