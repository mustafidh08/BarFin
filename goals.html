<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Goals Keuangan — KeuanganSyariah.id</title>
  <meta name="description" content="Tentukan dan pantau goal keuangan islami: umroh, sedekah, dana darurat, pendidikan.">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#059669">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:'class',theme:{extend:{fontFamily:{sans:['Plus Jakarta Sans','sans-serif']}}}}</script>
  <link rel="stylesheet" href="css/custom.css">
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
  <aside id="sidebar" class="fixed left-0 top-0 bottom-0 w-64 bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 flex flex-col z-40 overflow-y-auto"></aside>

  <main class="main-content md:ml-64 p-4 md:p-8 pb-24">
    <div class="flex items-center justify-between mb-6">
      <div>
        <h1 class="text-2xl md:text-3xl font-bold">Goals Keuangan</h1>
        <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">Tetapkan tujuan dan pantau progressmu</p>
      </div>
      <button onclick="openAddGoalModal()" class="px-5 py-2.5 bg-emerald-600 text-white text-sm font-semibold rounded-xl hover:bg-emerald-700 transition">+ Tambah Goal</button>
    </div>
    <div id="goals-grid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
  </main>

  <nav id="bottom-nav" class="fixed bottom-0 left-0 right-0 bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 flex justify-around items-center h-16 z-40 md:hidden"></nav>

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/storage.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/app.js"></script>
  <script src="js/goals.js"></script>
  <script>document.addEventListener('DOMContentLoaded', () => { renderGoals(); });</script>
</body>
</html>
